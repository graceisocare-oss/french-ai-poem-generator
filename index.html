<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <link rel="stylesheet" href="src/style.css" />
    <title>AI French Poem Generator</title>
</head>
<body>
    <div class="container">
    <header>
      <h1>AI French Poem Generator</h1>      
    </header>

    <main>
        <form id="poem-generator-form">
            <input 
            type="text" 
            placeholder="Enter the topic of the French Poem" 
            autofocus 
            required 
            autocomplete="off" 
            class="instructions"
            />
            <input type="submit" class="submit-button" />
        </form>
        <div class="poem" id="poem"></div>
    </main>

    <footer>
        This AI project is coded by Grace Care and is open-sourced on <a href="https://github.com/graceisocare-oss/french-ai-poem-generator" target="_blank">Github</a> and is hosted on <a href="https://app.netlify.com/projects/french-ai-poem-generator" target="_blank">Netlify.</a> 
        
    </footer>
    </div>
<script src="src/index.js"></script>
</body>
</html>
