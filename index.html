<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/style.css" />
    <title>AI French Poem Generator</title>
</head>
<body>
    <header>
      <h1>AI French Poem Generator</h1>      
    </header>

    <main>
        <form>
            <input type="text" placeholder="Enter the topic of the French Poem" 
            autofocus 
            required 
            autocomplete="off" />
            <input type="submit" />
        </form>
        <div>
            La tombe dit à la rose
            <br />
            Des pleurs dont l'aube t'arose
        </div>
    </main>

    <footer>
        This AI project is coded by Grace Care and is open-sourced on <a href="https://github.com/graceisocare-oss/french-ai-poem-generator" target="_blank">Github</a> and is hosted on <a href="https://app.netlify.com/projects/french-ai-poem-generator" target="_blank">Netlify.</a> 
        
    </footer>
<script src="src/index.js"></script>
</body>
</html>
